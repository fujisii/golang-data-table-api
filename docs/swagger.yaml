    get:
      parameters:
      - default: 1
        description: ページ番号（1以上）
        in: query
        minimum: 1
        name: page
        type: integer
      - default: 20
        description: 件数（1-100）
        in: query
        maximum: 100
        minimum: 1
        name: limit
        type: integer
      - description: ソートキー
        enum:
        - name
        - loginId
        in: query
        name: sort
        type: string
      - description: ソート順
