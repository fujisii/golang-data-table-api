basePath: /
definitions:
  facilitators.Facilitator:
    properties:
      id:
        type: integer
      loginId:
        type: string
      name:
        type: string
    type: object
  facilitators.ListResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/facilitators.Facilitator'
        type: array
      totalCount:
        type: integer
    type: object
host: localhost:3000
info:
  contact: {}
  description: ファシリテーター一覧 API（react-data-table-api の Go 移植版）
  title: golang-data-table-api
  version: 1.0.0
paths:
